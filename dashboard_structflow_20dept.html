<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>経営ダッシュボード｜株式会社テクノソリューションズ</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  /* Brand */
  --ink:#0d0d0d;--paper:#f5f3ee;--cream:#ede9e0;
  --blue:#1a4fff;--blue-lt:#e8eeff;
  --green:#00855a;--green-lt:#e6f4ef;
  --orange:#d95e00;--orange-lt:#fff0e6;
  --red:#c0392b;--red-lt:#fdf0ef;
  --rule:#d5d0c5;--muted:#888078;
  /* Dark shell */
  --sh-bg:#0a0d14;--sh-bg2:#111520;--sh-bg3:#181d2e;
  --sh-surface:#1e2438;--sh-surface2:#252c42;
  --sh-border:#2e3754;--sh-border2:#3d4a6e;
  --sh-accent:#4f8ef7;--sh-accent2:#7eb3ff;
  --sh-text:#e8ecf5;--sh-text2:#8b97b8;--sh-text3:#5a6585;
  /* Fonts */
  --mono:'JetBrains Mono',monospace;
  --sans:'Plus Jakarta Sans',sans-serif;
  --serif:'Shippori Mincho',serif;
  /* Layout */
  --sidebar:220px;--topbar:52px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--sh-bg);color:var(--sh-text);font-family:var(--sans);font-size:14px;line-height:1.7;height:100vh;overflow:hidden;}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--sh-bg2);}
::-webkit-scrollbar-thumb{background:var(--sh-border2);border-radius:3px;}

/* ── Shell ── */
.shell{display:grid;grid-template-columns:var(--sidebar) 1fr;grid-template-rows:var(--topbar) 1fr;height:100vh;}

/* ── Topbar ── */
.topbar{
  grid-column:1/-1;
  background:var(--sh-bg2);
  border-bottom:1px solid var(--sh-border);
  display:flex;align-items:center;padding:0 24px;gap:16px;
  position:relative;z-index:100;
}
.topbar-logo{
  font-family:var(--serif);font-size:17px;font-weight:700;
  color:#fff;white-space:nowrap;letter-spacing:.02em;
}
.topbar-sep{width:1px;height:20px;background:var(--sh-border);}
.topbar-title{font-size:12px;color:var(--sh-text2);}
.topbar-badge{
  margin-left:auto;
  background:rgba(79,142,247,.12);border:1px solid var(--sh-accent);
  color:var(--sh-accent2);font-family:var(--mono);font-size:10px;
  padding:2px 10px;border-radius:20px;
}
.topbar-date{font-family:var(--mono);font-size:11px;color:var(--sh-text3);}

/* ── Sidebar ── */
.sidebar{
  background:var(--sh-bg2);border-right:1px solid var(--sh-border);
  padding:16px 0;overflow-y:auto;
}
.nav-section-label{
  font-size:9px;font-weight:700;letter-spacing:.15em;
  color:var(--sh-text3);text-transform:uppercase;
  padding:0 18px 6px;margin-top:14px;
}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 18px;cursor:pointer;
  font-size:12px;color:var(--sh-text2);
  border-left:2px solid transparent;
  transition:all .15s;user-select:none;
}
.nav-item:hover{color:var(--sh-text);background:var(--sh-surface);}
.nav-item.active{
  color:var(--sh-accent2);background:rgba(79,142,247,.08);
  border-left-color:var(--sh-accent);font-weight:600;
}
.nav-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--sh-border2);flex-shrink:0;
  transition:background .15s;
}
.nav-item.active .nav-dot{background:var(--sh-accent);}
.nav-badge{
  margin-left:auto;font-family:var(--mono);font-size:9px;
  background:var(--sh-surface2);color:var(--sh-text3);
  padding:1px 6px;border-radius:10px;
}
.nav-badge.danger{background:rgba(192,57,43,.2);color:#e88;}
.nav-badge.warn{background:rgba(217,94,0,.2);color:#f9a;}

/* ── Main ── */
.main-area{
  overflow-y:auto;padding:28px 32px 60px;background:var(--sh-bg);
}

/* ── Page sections ── */
.page{display:none;}
.page.active{display:block;}

/* ── Section header ── */
.section-title{
  font-family:var(--serif);font-size:26px;font-weight:700;
  color:#fff;margin-bottom:4px;letter-spacing:.01em;
}
.section-sub{font-size:11px;color:var(--sh-text3);font-family:var(--mono);margin-bottom:24px;}

/* ── KPI row ── */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.kpi-card{
  background:var(--sh-surface);border:1px solid var(--sh-border);
  border-radius:10px;padding:18px 20px;position:relative;overflow:hidden;
  transition:border-color .2s;
}
.kpi-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--kc,var(--sh-accent));
}
.kpi-card:hover{border-color:var(--sh-border2);}
.kpi-label{font-size:10px;color:var(--sh-text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;}
.kpi-value{font-family:var(--mono);font-size:28px;font-weight:500;color:#fff;line-height:1;margin-bottom:4px;}
.kpi-unit{font-size:14px;color:var(--sh-text2);}
.kpi-sub{font-size:11px;color:var(--sh-text3);}
.kpi-badge{
  display:inline-block;font-size:10px;font-family:var(--mono);
  padding:2px 8px;border-radius:4px;margin-top:6px;
}
.badge-blue{background:rgba(79,142,247,.15);color:var(--sh-accent2);}
.badge-green{background:rgba(0,133,90,.15);color:#4dd;color:#3ecb8f;}
.badge-red{background:rgba(192,57,43,.15);color:#f77;}
.badge-warn{background:rgba(217,94,0,.15);color:#fb8;}

/* ── Cards ── */
.card{
  background:var(--sh-surface);border:1px solid var(--sh-border);
  border-radius:10px;padding:20px 22px;margin-bottom:16px;
}
.card-title{
  font-size:11px;font-weight:700;letter-spacing:.08em;
  text-transform:uppercase;color:var(--sh-text2);
  margin-bottom:16px;display:flex;align-items:center;gap:8px;
}
.card-title-dot{width:4px;height:14px;background:var(--sh-accent);border-radius:2px;flex-shrink:0;}

/* ── Grid helpers ── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}

/* ── Table ── */
.tbl-wrap{overflow-x:auto;}
table.dtbl{width:100%;border-collapse:collapse;font-size:12px;}
table.dtbl thead tr{background:var(--sh-bg);}
table.dtbl th{
  padding:9px 12px;text-align:left;
  color:var(--sh-text3);font-family:var(--mono);font-size:9px;
  letter-spacing:.1em;text-transform:uppercase;
  border-bottom:1px solid var(--sh-border);font-weight:400;
}
table.dtbl td{
  padding:8px 12px;border-bottom:1px solid var(--sh-border);
  color:var(--sh-text);vertical-align:middle;
}
table.dtbl tr:last-child td{border-bottom:none;}
table.dtbl tr:hover td{background:var(--sh-surface2);}

/* ── Risk badges ── */
.risk{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;}
.risk-high{background:rgba(192,57,43,.18);color:#f77;}
.risk-mid{background:rgba(217,94,0,.18);color:#fb8;}
.risk-low{background:rgba(0,133,90,.18);color:#3ecb8f;}

/* ── Light content area (paper) ── */
.paper-section{
  background:var(--paper);color:var(--ink);
  border-radius:10px;padding:28px 30px;margin-bottom:16px;
}
.paper-section h2{font-family:var(--serif);font-size:20px;font-weight:700;color:var(--ink);margin-bottom:16px;}
.dept-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;}
.dept-card{background:#fff;border:1.5px solid var(--rule);border-radius:10px;overflow:hidden;}
.dept-card-hd{background:var(--ink);padding:13px 18px;display:flex;justify-content:space-between;align-items:center;}
.dept-card-name{font-weight:700;font-size:12px;color:#fff;}
.dept-card-date{font-family:var(--mono);font-size:9px;color:#666;}
.dept-card-bd{padding:14px 18px;}
.mini-label{font-family:var(--mono);font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:12px 0 6px;}
.mini-label:first-child{margin-top:0;}
.task-item{display:flex;gap:8px;align-items:flex-start;padding:5px 0;border-bottom:1px solid var(--cream);font-size:11px;}
.task-item:last-child{border-bottom:none;}
.task-assignee{font-weight:700;white-space:nowrap;color:var(--blue);font-size:10px;min-width:55px;}
.task-title{color:#333;flex:1;}
.task-due{font-family:var(--mono);font-size:9px;color:var(--muted);white-space:nowrap;}
.risk-badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;margin:2px 2px 2px 0;}
.rb-high{background:var(--red-lt);color:var(--red);}
.rb-mid{background:var(--orange-lt);color:var(--orange);}
.rb-low{background:var(--green-lt);color:var(--green);}
.interdept-row{font-size:11px;padding:4px 0;border-bottom:1px solid var(--cream);display:flex;gap:8px;align-items:center;}
.interdept-row:last-child{border-bottom:none;}
.arrow{color:var(--blue);font-weight:700;}

/* ── Interdept map (dark) ── */
.idmap-row{
  display:flex;align-items:center;gap:10px;
  padding:8px 0;border-bottom:1px solid var(--sh-border);
  font-size:12px;
}
.idmap-row:last-child{border-bottom:none;}
.idmap-from{font-weight:600;min-width:130px;color:var(--sh-text);}
.idmap-arrow{color:var(--sh-accent);font-weight:700;}
.idmap-to{color:var(--sh-accent2);font-weight:600;min-width:130px;}
.idmap-content{font-size:11px;color:var(--sh-text2);flex:1;}

/* ── Status ── */
.status-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px;}
.s-done{background:#3ecb8f;}
.s-proc{background:#fb8;}

/* ── Chart wrapper ── */
.chart-wrap{position:relative;width:100%;}
</style>
</head>
<body>
<div class="shell">

<!-- Topbar -->
<div class="topbar">
  <div class="topbar-logo">テクノソリューションズ</div>
  <div class="topbar-sep"></div>
  <div class="topbar-title">経営ダッシュボード</div>
  <div class="topbar-badge">Power Automate × LDX hub StructFlow</div>
  <div class="topbar-date" id="topbar-date"></div>
</div>

<!-- Sidebar -->
<nav class="sidebar">
  <div class="nav-section-label">概要</div>
  <div class="nav-item active" onclick="nav(this,'overview')">
    <span class="nav-dot"></span>経営サマリー
    <span class="nav-badge badge-blue" id="nb-depts"></span>
  </div>

  <div class="nav-section-label">全社分析</div>
  <div class="nav-item" onclick="nav(this,'tasks')">
    <span class="nav-dot"></span>アクションアイテム
    <span class="nav-badge" id="nb-tasks"></span>
  </div>
  <div class="nav-item" onclick="nav(this,'risks')">
    <span class="nav-dot"></span>リスク・課題
    <span class="nav-badge danger" id="nb-risks"></span>
  </div>
  <div class="nav-item" onclick="nav(this,'interdept')">
    <span class="nav-dot"></span>部門間依頼マップ
    <span class="nav-badge" id="nb-inter"></span>
  </div>

  <div class="nav-section-label">部門別</div>
  <div class="nav-item" onclick="nav(this,'depts')">
    <span class="nav-dot"></span>各部門サマリー
  </div>
</nav>

<!-- Main -->
<main class="main-area">

  <!-- ① 経営サマリー -->
  <section id="overview" class="page active">
    <div class="section-title">経営サマリー</div>
    <div class="section-sub" id="overview-sub"></div>

    <div class="kpi-row" id="kpi-row"></div>

    <div class="grid-2">
      <div class="card">
        <div class="card-title"><span class="card-title-dot"></span>部門別タスク件数</div>
        <div class="chart-wrap" style="height:220px;"><canvas id="chartTasks" role="img" aria-label="部門別タスク件数棒グラフ"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title"><span class="card-title-dot"></span>リスク深刻度分布</div>
        <div class="chart-wrap" style="height:220px;"><canvas id="chartRisk" role="img" aria-label="リスク深刻度分布ドーナツグラフ"></canvas></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title"><span class="card-title-dot"></span>処理ステータス</div>
      <div id="status-list"></div>
    </div>
  </section>

  <!-- ② アクションアイテム -->
  <section id="tasks" class="page">
    <div class="section-title">アクションアイテム</div>
    <div class="section-sub">全部門・期限順</div>
    <div class="card">
      <div class="tbl-wrap">
        <table class="dtbl">
          <thead>
            <tr>
              <th>部門</th><th>担当者</th><th>タスク内容</th><th>期限</th><th>関連部門</th>
            </tr>
          </thead>
          <tbody id="tasks-tbody"></tbody>
        </table>
      </div>
    </div>
  </section>

  <!-- ③ リスク -->
  <section id="risks" class="page">
    <div class="section-title">リスク・課題</div>
    <div class="section-sub">全部門・深刻度順</div>

    <div class="kpi-row" id="risk-kpi-row"></div>

    <div class="grid-2">
      <div class="card">
        <div class="card-title"><span class="card-title-dot"></span>高リスク一覧</div>
        <div id="risk-high-list"></div>
      </div>
      <div class="card">
        <div class="card-title"><span class="card-title-dot"></span>中・低リスク一覧</div>
        <div id="risk-mid-list"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title"><span class="card-title-dot"></span>リスクマトリクス（件数×深刻度）</div>
      <div class="chart-wrap" style="height:260px;"><canvas id="chartRiskBar" role="img" aria-label="部門別リスク件数棒グラフ"></canvas></div>
    </div>
  </section>

  <!-- ④ 部門間依頼 -->
  <section id="interdept" class="page">
    <div class="section-title">部門間依頼マップ</div>
    <div class="section-sub">クロス部門の依存関係</div>
    <div class="card">
      <div id="interdept-list"></div>
    </div>
  </section>

  <!-- ⑤ 部門別サマリー -->
  <section id="depts" class="page">
    <div class="section-title">各部門サマリー</div>
    <div class="section-sub">StructFlow 抽出結果</div>
    <div class="paper-section">
      <div class="dept-grid" id="dept-grid"></div>
    </div>
  </section>

</main>
</div><!-- /shell -->

// INIT
// ============================================================
let allTasks = [], allRisks = [], allInterdept = [];

function init(data) {
  const completed = data.filter(d => d.status === 'completed' && d.results && d.results[0]);

  completed.forEach(d => {
    const out = d.results[0].output;
    if (out.tasks)            allTasks    = allTasks.concat(out.tasks.map(t => ({...t, dept: out.department})));
    if (out.risks)            allRisks    = allRisks.concat(out.risks.map(r => ({...r, dept: out.department})));
    if (out.interdept_requests) allInterdept = allInterdept.concat(out.interdept_requests);
  });

  const highRisks = allRisks.filter(r => r.severity === '高');
  const midRisks  = allRisks.filter(r => r.severity === '中');
  const lowRisks  = allRisks.filter(r => r.severity === '低');

  // Topbar date
  document.getElementById('topbar-date').textContent = new Date().toLocaleString('ja-JP');

  // Nav badges
  document.getElementById('nb-depts').textContent = data.length + '部門';
  document.getElementById('nb-tasks').textContent = allTasks.length + '件';
  document.getElementById('nb-risks').textContent = '高' + highRisks.length + '件';
  document.getElementById('nb-inter').textContent = allInterdept.length + '件';

  buildOverview(data, completed, highRisks, midRisks, lowRisks);
  buildTasks();
  buildRisks(highRisks, midRisks, lowRisks);
  buildInterdept();
  buildDepts(data);
  buildCharts(completed, highRisks, midRisks, lowRisks);
}

function buildOverview(data, completed, hi, mid, lo) {
  document.getElementById('overview-sub').textContent =
    completed.length + '/' + data.length + ' 部門完了 · 全社タスク ' + allTasks.length + ' 件 · 高リスク ' + hi.length + ' 件';

  const kpiRow = document.getElementById('kpi-row');
  kpiRow.innerHTML = [
    { label:'処理部門数', val:data.length,        unit:'部門', badge:'badge-blue',  sub:'StructFlow処理済み' },
    { label:'完了部門',   val:completed.length,   unit:'部門', badge:'badge-green', sub:'status: completed' },
    { label:'全社タスク', val:allTasks.length,    unit:'件',   badge:'badge-warn',  sub:'期限管理が必要' },
    { label:'高リスク',   val:hi.length,          unit:'件',   badge:'badge-red',   sub:'即時対応推奨' },
  ].map(k => `
    <div class="kpi-card" style="--kc:${k.badge==='badge-red'?'#c0392b':k.badge==='badge-green'?'#00855a':k.badge==='badge-warn'?'#d95e00':'#4f8ef7'}">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value">${k.val}<span class="kpi-unit">${k.unit}</span></div>
      <div class="kpi-sub">${k.sub}</div>
      <span class="kpi-badge ${k.badge}">${k.badge==='badge-red'?'要対応':k.badge==='badge-green'?'正常':k.badge==='badge-warn'?'確認中':'処理中'}</span>
    </div>
  `).join('');

  // Status list
  const sl = document.getElementById('status-list');
  const data2 = [...rawData];
  sl.innerHTML = data2.map(d => {
    const done = d.status === 'completed';
    const out  = done && d.results && d.results[0] ? d.results[0].output : null;
    return `<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--sh-border);font-size:12px;">
      <span class="status-dot ${done?'s-done':'s-proc'}"></span>
      <span style="font-weight:600;min-width:150px;">${out ? out.department : '処理中...'}</span>
      <span style="color:var(--sh-text3);font-family:var(--mono);font-size:10px;">${done?'completed':'processing'}</span>
      ${out ? `<span style="margin-left:auto;color:var(--sh-text2);font-size:11px;">タスク ${(out.tasks||[]).length}件 / リスク ${(out.risks||[]).length}件</span>` : ''}
    </div>`;
  }).join('');
}

// ============================================================
// ② タスク一覧
// ============================================================
function buildTasks() {
  const sorted = [...allTasks].sort((a, b) => (a.due_date||'').localeCompare(b.due_date||''));
  document.getElementById('tasks-tbody').innerHTML = sorted.map((t, i) => `
    <tr>
      <td style="font-weight:700;font-size:11px;">${t.dept||''}</td>
      <td style="color:var(--sh-accent2);font-weight:600;">${t.assignee||''}</td>
      <td>${t.title||''}</td>
      <td style="font-family:var(--mono);font-size:10px;white-space:nowrap;">${t.due_date||''}</td>
      <td style="font-size:11px;color:var(--sh-text3);">${t.related_dept||''}</td>
    </tr>
  `).join('');
}

// ============================================================
// ③ リスク
// ============================================================
function buildRisks(hi, mid, lo) {
  // KPI
  document.getElementById('risk-kpi-row').innerHTML = [
    { label:'高リスク', val:hi.length,  badge:'badge-red',   color:'#c0392b' },
    { label:'中リスク', val:mid.length, badge:'badge-warn',  color:'#d95e00' },
    { label:'低リスク', val:lo.length,  badge:'badge-green', color:'#00855a' },
    { label:'合計',     val:allRisks.length, badge:'badge-blue', color:'#4f8ef7' },
  ].map(k => `
    <div class="kpi-card" style="--kc:${k.color}">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value">${k.val}<span class="kpi-unit">件</span></div>
      <span class="kpi-badge ${k.badge}">${k.label}</span>
    </div>
  `).join('');

  const mkList = (list, cls) => list.map(r => `
    <div style="padding:8px 0;border-bottom:1px solid var(--sh-border);">
      <span class="risk ${cls}">${r.severity}</span>
      <span style="font-size:12px;font-weight:600;margin-left:8px;">${r.item||''}</span>
      <div style="font-size:11px;color:var(--sh-text3);margin-top:3px;padding-left:4px;">${r.related_dept||r.dept||''}</div>
    </div>
  `).join('');

  document.getElementById('risk-high-list').innerHTML = hi.length ? mkList(hi, 'risk-high') : '<div style="color:var(--sh-text3);font-size:12px;">高リスクなし</div>';
  document.getElementById('risk-mid-list').innerHTML  = [...mid,...lo].length ? mkList([...mid,...lo], mid.length?'risk-mid':'risk-low') : '<div style="color:var(--sh-text3);font-size:12px;">該当なし</div>';
}

// ============================================================
// ④ 部門間依頼
// ============================================================
function buildInterdept() {
  const el = document.getElementById('interdept-list');
  if (!allInterdept.length) { el.innerHTML = '<div style="color:var(--sh-text3);font-size:12px;">部門間依頼なし</div>'; return; }
  el.innerHTML = allInterdept.map(r => `
    <div class="idmap-row">
      <span class="idmap-from">${r.from||''}</span>
      <span class="idmap-arrow">→</span>
      <span class="idmap-to">${r.to||''}</span>
      <span class="idmap-content">${r.content||''}</span>
    </div>
  `).join('');
}

// ============================================================
// ⑤ 部門別カード（paper tone）
// ============================================================
function buildDepts(data) {
  document.getElementById('dept-grid').innerHTML = data.map(d => {
    if (d.status === 'processing') return `
      <div class="dept-card">
        <div class="dept-card-hd"><span class="dept-card-name">処理中...</span></div>
        <div class="dept-card-bd" style="color:var(--muted);font-size:12px;">StructFlow処理中</div>
      </div>`;
    const out = d.results[0].output;
    return `
      <div class="dept-card">
        <div class="dept-card-hd">
          <span class="dept-card-name">${out.department||''}</span>
          <span class="dept-card-date">${out.meeting_date||''}</span>
        </div>
        <div class="dept-card-bd">
          <div class="mini-label">アクションアイテム（${(out.tasks||[]).length}件）</div>
          ${(out.tasks||[]).slice(0,3).map(t=>`
          <div class="task-item">
            <span class="task-assignee">${t.assignee||''}</span>
            <span class="task-title">${t.title||''}</span>
            <span class="task-due">${t.due_date||''}</span>
          </div>`).join('')}
          ${(out.tasks||[]).length>3?`<div style="font-size:10px;color:var(--muted);margin-top:4px;">他${(out.tasks||[]).length-3}件...</div>`:''}
          <div class="mini-label">リスク</div>
          ${(out.risks||[]).map(r=>`<span class="risk-badge ${r.severity==='高'?'rb-high':r.severity==='中'?'rb-mid':'rb-low'}">${r.severity}: ${r.item||''}</span>`).join('')||'<span style="font-size:11px;color:var(--muted);">なし</span>'}
          <div class="mini-label">部門間依頼（${(out.interdept_requests||[]).length}件）</div>
          ${(out.interdept_requests||[]).slice(0,2).map(r=>`
          <div class="interdept-row">
            <span class="arrow">→</span>
            <span style="font-weight:700;font-size:11px;">${r.to||''}</span>
            <span style="font-size:11px;color:#555;">${r.content||''}</span>
          </div>`).join('')||'<span style="font-size:11px;color:var(--muted);">なし</span>'}
        </div>
      </div>`;
  }).join('');
}

// ============================================================
// CHARTS
// ============================================================
function buildCharts(completed, hi, mid, lo) {
  const baseOpts = {
    responsive:true, maintainAspectRatio:false,
    plugins:{ legend:{ display:false } }
  };
  const gridColor = 'rgba(255,255,255,0.05)';
  const tickColor = '#8b97b8';

  // 部門別タスク件数（棒グラフ）
  const deptLabels = completed.map(d => d.results[0].output.department || '不明');
  const deptTaskCounts = completed.map(d => (d.results[0].output.tasks||[]).length);

  new Chart(document.getElementById('chartTasks'), {
    type:'bar',
    data:{
      labels: deptLabels,
      datasets:[{
        label:'タスク件数',
        data: deptTaskCounts,
        backgroundColor: deptTaskCounts.map(v => v >= 5 ? 'rgba(248,113,113,0.7)' : v >= 3 ? 'rgba(251,191,36,0.7)' : 'rgba(52,211,153,0.7)'),
        borderRadius:5,
        borderSkipped:false,
      }]
    },
    options:{
      ...baseOpts,
      scales:{
        x:{ grid:{display:false}, ticks:{color:tickColor,font:{size:10}}, border:{color:'transparent'} },
        y:{ min:0, grid:{color:gridColor}, ticks:{color:tickColor,font:{size:10},stepSize:1}, border:{color:'transparent'} }
      }
    }
  });

  // リスク深刻度ドーナツ
  new Chart(document.getElementById('chartRisk'), {
    type:'doughnut',
    data:{
      labels:['高リスク','中リスク','低リスク'],
      datasets:[{
        data:[hi.length, mid.length, lo.length],
        backgroundColor:['rgba(248,113,113,0.8)','rgba(251,191,36,0.8)','rgba(52,211,153,0.8)'],
        borderColor:['#f87171','#fbbf24','#34d399'],
        borderWidth:1,
        hoverOffset:6,
      }]
    },
    options:{
      ...baseOpts,
      cutout:'65%',
      plugins:{
        legend:{
          display:true,
          position:'bottom',
          labels:{color:tickColor,font:{size:11},padding:16,boxWidth:10}
        }
      }
    }
  });

  // 部門別リスク件数棒グラフ
  const riskLabels = completed.map(d => d.results[0].output.department || '不明');
  const riskHiCounts  = completed.map(d => (d.results[0].output.risks||[]).filter(r=>r.severity==='高').length);
  const riskMidCounts = completed.map(d => (d.results[0].output.risks||[]).filter(r=>r.severity==='中').length);
  const riskLoCounts  = completed.map(d => (d.results[0].output.risks||[]).filter(r=>r.severity==='低').length);

  new Chart(document.getElementById('chartRiskBar'), {
    type:'bar',
    data:{
      labels: riskLabels,
      datasets:[
        { label:'高', data:riskHiCounts,  backgroundColor:'rgba(248,113,113,0.75)', borderRadius:4, stack:'risk' },
        { label:'中', data:riskMidCounts, backgroundColor:'rgba(251,191,36,0.75)',  borderRadius:4, stack:'risk' },
        { label:'低', data:riskLoCounts,  backgroundColor:'rgba(52,211,153,0.75)',  borderRadius:4, stack:'risk' },
      ]
    },
    options:{
      ...baseOpts,
      plugins:{
        legend:{display:true,labels:{color:tickColor,font:{size:11},boxWidth:10}}
      },
      scales:{
        x:{ grid:{display:false}, ticks:{color:tickColor,font:{size:10}}, border:{color:'transparent'}, stacked:true },
        y:{ min:0, grid:{color:gridColor}, ticks:{color:tickColor,font:{size:10},stepSize:1}, border:{color:'transparent'}, stacked:true }
      }
    }
  });
}

// ============================================================
// NAV
// ============================================================
function nav(el, page) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelectorAll('.page').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(page).classList.add('active');
}

// ============================================================
// RUN
// ============================================================
init(rawData);
</script>
</body>
</html>
